backend:
  name: github
  repo: Monetools/Monetools
  branch: main
  base_url: https://monetools.com

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

# 允许直接在编辑器里使用HTML代码
editor:
  preview: true

collections:
  - name: "self-employed"
    label: "Self-Employed Articles"
    folder: "blog/self-employed"
    create: true
    slug: "{{slug}}"
    extension: "html"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "文章标题" }
      - { label: "Meta Description (SEO)", name: "description", widget: "string", hint: "SEO描述，150字以内" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - label: "Target Keyword"
        name: "keyword"
        widget: "string"
        hint: "主要SEO关键词"
      - label: "Related Tool"
        name: "related_tool"
        widget: "select"
        options:
          - { label: "Business Structure Assessment", value: "/tools/self-employed/should-i-form-an-llc.html" }
          - { label: "LLC vs S-Corp Calculator", value: "/tools/self-employed/llc-vs-s-corp.html" }
          - { label: "Quarterly Tax Estimator", value: "/tools/self-employed/quarterly-tax-estimator.html" }
          - { label: "True Hourly Rate Calculator", value: "/tools/self-employed/true-hourly-rate.html" }
          - { label: "S-Corp Readiness Assessment", value: "/tools/self-employed/s-corp-readiness.html" }
      - label: "Article Body"
        name: "body"
        widget: "markdown"
        # 支持HTML代码直接粘贴
        sanitize_preview: false
        hint: "右上角切换按钮：可视化模式 ↔ 代码模式（可直接粘贴HTML）"

  - name: "side-hustlers"
    label: "Side Hustler Articles"
    folder: "blog/side-hustlers"
    create: true
    slug: "{{slug}}"
    extension: "html"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Meta Description (SEO)", name: "description", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Target Keyword", name: "keyword", widget: "string" }
      - label: "Article Body"
        name: "body"
        widget: "markdown"
        sanitize_preview: false

  - name: "landlords"
    label: "Landlord Articles"
    folder: "blog/landlords"
    create: true
    slug: "{{slug}}"
    extension: "html"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Meta Description (SEO)", name: "description", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Target Keyword", name: "keyword", widget: "string" }
      - label: "Article Body"
        name: "body"
        widget: "markdown"
        sanitize_preview: false
