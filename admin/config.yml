# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: Monetools/Monetools
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/85f39cf4-5a74-40ad-929a-75a28d932b1b/pkce
  auth_token_endpoint: /sites/85f39cf4-5a74-40ad-929a-75a28d932b1b/token
  gateway_url: https://gateway.decapbridge.com
  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge
# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url
# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg
# Add site links in Decap CMS (optional)
site_url: https://monetools.pages.dev

# 已加入：保存草稿功能（Draft -> Review -> Ready -> Publish 流程）
publish_mode: editorial_workflow

media_folder: "content/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    filter: { field: "tags", value: "blog" }
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post.njk" }
      - { label: "Title", name: "title", widget: "string", hint: "文章标题" }
      - { label: "Meta Description (SEO)", name: "description", widget: "string", hint: "SEO描述，150字以内" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Target Keyword", name: "keyword", widget: "string", required: false, hint: "主要SEO关键词，逗号分隔" }
      - label: "Audience"
        name: "audience"
        widget: "select"
        required: false
        hint: "这篇文章属于哪个人群（用于列表页分类展示，可不选）"
        options:
          - { label: "Self-Employed", value: "self-employed" }
          - { label: "Side Hustlers", value: "side-hustlers" }
          - { label: "Landlords", value: "landlords" }
      - label: "Related Tool"
        name: "related_tool"
        widget: "string"
        required: false
        hint: "关联工具的路径，例如 /tools/self-employed/should-i-form-an-llc.html（可不填）"
      - { label: "Tags", name: "tags", widget: "hidden", default: ["blog"] }
      - label: "Article Body"
        name: "body"
        widget: "richtext"
        hint: "正文内容 — 只写正文，不要包含标题。插入链接：选中文字后点工具栏的链接图标即可，图片：点工具栏图片图标直接上传。"
